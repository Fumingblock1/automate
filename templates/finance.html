{% extends "base.html" %}
{% block title %}Finance Checker{% endblock %}

{% block content %}
<section class="page-header">
  <div class="container">
    <h1>💳 Finance Eligibility Checker</h1>
    <p>Find out your finance options instantly</p>
  </div>
</section>

<section class="section">
  <div class="container narrow">

    <div class="form-card">
      <h2>Enter Your Details</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Car Price ($)</label>
          <input type="number" id="price" placeholder="e.g. 25000">
        </div>
        <div class="form-group">
          <label>Annual Income ($)</label>
          <input type="number" id="income" placeholder="e.g. 55000">
        </div>
        <div class="form-group">
          <label>Credit Score Range</label>
          <select id="credit">
            <option value="Excellent (750+)">Excellent (750+)</option>
            <option value="Good (700-749)">Good (700-749)</option>
            <option value="Fair (650-699)">Fair (650-699)</option>
            <option value="Poor (600-649)">Poor (600-649)</option>
            <option value="Very Poor (below 600)">Very Poor (below 600)</option>
            <option value="No credit history">No credit history</option>
          </select>
        </div>
        <div class="form-group">
          <label>Deposit Available ($)</label>
          <input type="number" id="deposit" placeholder="e.g. 3000">
        </div>
        <div class="form-group form-full">
          <label>Employment Status</label>
          <select id="employment">
            <option value="Full-time employed">Full-time employed</option>
            <option value="Part-time employed">Part-time employed</option>
            <option value="Self-employed">Self-employed</option>
            <option value="Unemployed">Unemployed</option>
            <option value="Student">Student</option>
            <option value="Retired">Retired</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="checkFinance()">Check Eligibility</button>
    </div>

    <div id="result-section" class="result-card hidden">
      <h2>💳 Finance Assessment</h2>
      <div id="result-content" class="result-content"></div>
    </div>

  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
async function checkFinance() {
  const data = {
    price: document.getElementById('price').value,
    income: document.getElementById('income').value,
    credit: document.getElementById('credit').value,
    deposit: document.getElementById('deposit').value,
    employment: document.getElementById('employment').value
  };

  if (!data.price || !data.income) {
    alert('Please enter car price and income!');
    return;
  }

  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'Checking...';
  btn.disabled = true;

  const response = await fetch('/finance/check', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  const result = await response.json();
  document.getElementById('result-content').innerHTML = formatResult(result.result);
  document.getElementById('result-section').classList.remove('hidden');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });

  btn.textContent = 'Check Eligibility';
  btn.disabled = false;
}

function formatResult(text) {
  return text
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^[-*] (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, match => `<ul>${match}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, ' ');
}
</script>
{% endblock %}
