{% extends "base.html" %}
{% block title %}Compare Cars{% endblock %}

{% block content %}
<section class="page-header">
  <div class="container">
    <h1>⚖️ Car Comparison Tool</h1>
    <p>Compare two cars side by side with AI analysis</p>
  </div>
</section>

<section class="section">
  <div class="container">

    <div class="form-card">
      <h2>Enter Both Cars</h2>
      <div class="compare-grid">

        <div class="compare-col">
          <h3 class="compare-title">🚗 Car 1</h3>
          <div class="form-group">
            <label>Make</label>
            <input type="text" id="car1_make" placeholder="e.g. Toyota">
          </div>
          <div class="form-group">
            <label>Model</label>
            <input type="text" id="car1_model" placeholder="e.g. Camry">
          </div>
          <div class="form-group">
            <label>Year</label>
            <input type="number" id="car1_year" placeholder="e.g. 2021">
          </div>
          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" id="car1_price" placeholder="e.g. 25000">
          </div>
        </div>

        <div class="compare-vs">VS</div>

        <div class="compare-col">
          <h3 class="compare-title">🚙 Car 2</h3>
          <div class="form-group">
            <label>Make</label>
            <input type="text" id="car2_make" placeholder="e.g. Honda">
          </div>
          <div class="form-group">
            <label>Model</label>
            <input type="text" id="car2_model" placeholder="e.g. Accord">
          </div>
          <div class="form-group">
            <label>Year</label>
            <input type="number" id="car2_year" placeholder="e.g. 2021">
          </div>
          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" id="car2_price" placeholder="e.g. 27000">
          </div>
        </div>

      </div>
      <button class="btn btn-primary" onclick="compareCars()">Compare With AI</button>
    </div>

    <div id="result-section" class="result-card hidden">
      <h2>⚖️ Comparison Result</h2>
      <div id="result-content" class="result-content"></div>
    </div>

  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
async function compareCars() {
  const data = {
    car1_make: document.getElementById('car1_make').value,
    car1_model: document.getElementById('car1_model').value,
    car1_year: document.getElementById('car1_year').value,
    car1_price: document.getElementById('car1_price').value,
    car2_make: document.getElementById('car2_make').value,
    car2_model: document.getElementById('car2_model').value,
    car2_year: document.getElementById('car2_year').value,
    car2_price: document.getElementById('car2_price').value,
  };

  if (!data.car1_make || !data.car2_make) {
    alert('Please fill in both cars!');
    return;
  }

  const btn = document.querySelector('.btn-primary');
  btn.textContent = 'Analyzing...';
  btn.disabled = true;

  const response = await fetch('/compare/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  const result = await response.json();
  document.getElementById('result-content').innerHTML = formatResult(result.result);
  document.getElementById('result-section').classList.remove('hidden');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });

  btn.textContent = 'Compare With AI';
  btn.disabled = false;
}

function formatResult(text) {
  return text
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^[-*] (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, match => `<ul>${match}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, ' ');
}
</script>
{% endblock %}
